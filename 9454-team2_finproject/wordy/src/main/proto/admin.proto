syntax = "proto3";

package wordy;

option java_package = "com.team2.wordy.proto";
option java_outer_classname = "AdminProto";
option java_multiple_files = true;

// ─────────────────────────────────────────────
//  ADMIN SERVICE
//  CRUD+Search operations on player accounts,
//  plus server-side time configuration.
// ─────────────────────────────────────────────

service AdminService {

  // ── Player CRUD+Search ───────────────────────

  rpc CreatePlayer (CreatePlayerRequest) returns (CreatePlayerResponse);
  rpc ReadPlayer   (ReadPlayerRequest)   returns (ReadPlayerResponse);
  rpc UpdatePlayer (UpdatePlayerRequest) returns (UpdatePlayerResponse);
  rpc DeletePlayer (DeletePlayerRequest) returns (DeletePlayerResponse);
  rpc SearchPlayer (SearchPlayerRequest) returns (SearchPlayerResponse);

  // ── Time Configuration ───────────────────────

  // Read current time settings (shown when admin opens config screen)
  rpc GetTimeConfig (GetTimeConfigRequest) returns (GetTimeConfigResponse);

  // Update one or both time settings
  rpc SetTimeConfig (SetTimeConfigRequest) returns (SetTimeConfigResponse);
}

// ── Shared: PlayerRecord ───────────────────────
//  Represents a player account (never includes password in responses).

message PlayerRecord {
  int32  id       = 1;
  string username = 2;
  string role     = 3;  // "PLAYER" | "ADMIN"
}

// ── Create ─────────────────────────────────────

message CreatePlayerRequest {
  string admin_token = 1;  // must be an ADMIN session token
  string username    = 2;
  string password    = 3;  // plaintext; server hashes before storing
  string role        = 4;  // "PLAYER" | "ADMIN"
}

message CreatePlayerResponse {
  bool   success = 1;
  string message = 2;  // e.g. "Player created" | "Username already exists"
  PlayerRecord player = 3;
}

// ── Read ───────────────────────────────────────

message ReadPlayerRequest {
  string admin_token = 1;
  int32  player_id   = 2;
}

message ReadPlayerResponse {
  bool         success = 1;
  string       message = 2;
  PlayerRecord player  = 3;
}

// ── Update ─────────────────────────────────────

message UpdatePlayerRequest {
  string admin_token   = 1;
  int32  player_id     = 2;
  string new_username  = 3;  // leave empty to keep current
  string new_password  = 4;  // leave empty to keep current
  string new_role      = 5;  // leave empty to keep current
}

message UpdatePlayerResponse {
  bool         success = 1;
  string       message = 2;
  PlayerRecord player  = 3;  // updated record
}

// ── Delete ─────────────────────────────────────

message DeletePlayerRequest {
  string admin_token = 1;
  int32  player_id   = 2;
}

message DeletePlayerResponse {
  bool   success = 1;
  string message = 2;  // e.g. "Player deleted" | "Player not found"
}

// ── Search ─────────────────────────────────────

message SearchPlayerRequest {
  string admin_token = 1;
  string query       = 2;  // partial or full username to search
}

message SearchPlayerResponse {
  bool                  success = 1;
  string                message = 2;
  repeated PlayerRecord players = 3;  // all matching results
}

// ── Time Config ────────────────────────────────

message GetTimeConfigRequest {
  string admin_token = 1;
}

message GetTimeConfigResponse {
  bool   success              = 1;
  int32  join_wait_seconds    = 2;  // default: 10
  int32  round_duration_seconds = 3; // default: 30
}

message SetTimeConfigRequest {
  string admin_token            = 1;
  int32  join_wait_seconds      = 2;  // 0 = keep current value
  int32  round_duration_seconds = 3;  // 0 = keep current value
}

message SetTimeConfigResponse {
  bool   success  = 1;
  string message  = 2;  // e.g. "Configuration updated"
  int32  join_wait_seconds      = 3;  // confirmed new value
  int32  round_duration_seconds = 4;  // confirmed new value
}
